; CameraCull - Camera Proximity Culling for Skyrim AE
; Place in Data/SKSE/Plugins/CameraCull.ini

[General]
; Radius in Skyrim units from the camera at which objects are culled.
; 64  = very close (only things clipping into the camera)
; 128 = default (roughly 2m, good for heavy foliage)
; 256 = aggressive
fCullRadius = 128.0

; Culling mode:
;   hard  - instant AppCulled toggle, no alpha transition, cheapest
;   fade  - linear alpha from 0 (at camera) to 1 (at fCullRadius), smoother
;   both  - fade in the outer band, hard-cull within fHardRatio * fCullRadius
sMode = both

; Fraction of fCullRadius below which hard-culling fires (only used in "both" mode)
; 0.5 = hard-cull starts at 64 units if fCullRadius is 128
fHardRatio = 0.5

; Only cull when in 3rd person view
bOnly3rdPerson = true

; Scan for nearby refs every N frames. Lower = more responsive, slightly more CPU.
; 1 = every frame, 3 = every 3rd frame (recommended)
iScanInterval = 3

[Types]
; Toggle culling per object type
bCullStatics = true   ; rocks, barrels, furniture, containers
bCullTrees   = true   ; trees, large shrubs
bCullFlora   = true   ; harvestable plants, small bushes, ingredient plants
