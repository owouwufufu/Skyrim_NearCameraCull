name: Build CameraCull

on:
  push:
    branches: [main]
    tags:     ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-2022
    name: MSVC Release (AE 1.6.1170)

    steps:
      - uses: actions/checkout@v4

      - name: Clone and bootstrap vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git vcpkg
          cd vcpkg
          git checkout a34c873a9717a888f58dc05268dea15592c2f822
          .\bootstrap-vcpkg.bat -disableMetrics

      - name: Configure CMake
        run: cmake --preset release
        env:
          VCPKG_ROOT: '${{ github.workspace }}\vcpkg'

      - name: Build
        run: cmake --build --preset release

      - name: Stage plugin files
        run: cmake --install build/release --prefix staging

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: CameraCull-AE
          path: staging/

      - name: Zip for release
        if: startsWith(github.ref, 'refs/tags/v')
        run: Compress-Archive -Path staging\* -DestinationPath CameraCull-AE.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: CameraCull-AE.zip
          generate_release_notes: true
